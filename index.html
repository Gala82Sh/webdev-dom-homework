<!DOCTYPE html>
<html>
  <head>
    <title>Проект "Комменты"</title>
    <meta charset="utf-8" />
    <link rel="stylesheet" href="styles.css" />
  </head>

  <body>
    <div class="container">
      <div id="comments-loader" class="loader" style="display: none;">
        <div class="spinner"></div>
        <p>Комментарии загружаются...</p>
      </div>

      <ul class="comments"></ul>
      <div class="add-form">
        <input type="text" class="add-form-name" placeholder="Введите ваше имя" />
        <textarea type="textarea" class="add-form-text" placeholder="Введите ваш комментарий" rows="4"></textarea>
        <div class="add-form-row">
          <button class="add-form-button">Написать</button>
        </div>
      </div>

      <div class="add-form-loader" style="display: none;">
        <div class="spinner"></div>
        <p>Комментарий добавляется...</p>
      </div>
    </div>

    <script type="module" src="js/main.js"></script>
  </body>
</html>
