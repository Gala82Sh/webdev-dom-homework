<!DOCTYPE html>
<html>
  <head>
    <title>Проект "Комменты"</title>
    <meta charset="utf-8" />
    <link rel="stylesheet" href="styles.css" />
  </head>

  <body>
    <div class="container">
      <ul class="comments">
      </ul>
      <div class="add-form">
        <input
          type="text"
          class="add-form-name"
          placeholder="Введите ваше имя"
        />
        <textarea
          type="textarea"
          class="add-form-text"
          placeholder="Введите ваш коментарий"
          rows="4"
        ></textarea>
        <div class="add-form-row">
          <button class="add-form-button">Написать</button>
        </div>
      </div>
    </div>
  </body>

  <script>
    "use strict";
    let comments = [
      {
        id: 1,
        name: "Глеб Фокин",
        text: "Это будет первый комментарий на этой странице",
        date: "12.02.22 12:18",
        likes: 3,
        isLiked: false
      },
      {
        id: 2,
        name: "Варвара Н.",
        text: "Мне нравится как оформлена эта страница! ❤",
        date: "13.02.22 19:22",
        likes: 75,
        isLiked: true
      }
    ];
function getCurrentDateTime() {
      const now = new Date();
      const day = String(now.getDate()).padStart(2, '0');
      const month = String(now.getMonth() + 1).padStart(2, '0');
      const year = now.getFullYear();
      const hours = String(now.getHours()).padStart(2, '0');
      const minutes = String(now.getMinutes()).padStart(2, '0');
      return `${day}.${month}.${year} ${hours}:${minutes}`;
    }

 function sanitizeHtml(str) {
      if (!str) return '';
      return str
        .replaceAll('&', '&amp;')
        .replaceAll('<', '&lt;')
        .replaceAll('>', '&gt;')
        .replaceAll('"', '&quot;')
        .replaceAll("'", '&#39;');
    }
    function escapeHtml(str) {
      return sanitizeHtml(str);
    }

   function renderComments() {
      const commentsList = document.querySelector('.comments');
      
      if (!commentsList) {
        console.error('Список комментариев не найден!');
        return;
      }
      
      commentsList.innerHTML = '';
      
      for (let i = 0; i < comments.length; i++) {
        const comment = comments[i];
        const likeButtonClass = comment.isLiked ? 'like-button -active-like' : 'like-button';
        
        const commentHtml = `
          <li class="comment" data-id="${comment.id}">
            <div class="comment-header">
              <div>${escapeHtml(comment.name)}</div>
              <div>${escapeHtml(comment.date)}</div>
            </div>
            <div class="comment-body">
              <div class="comment-text">
                ${escapeHtml(comment.text)}
              </div>
            </div>
            <div class="comment-footer">
              <div class="likes">
                <span class="likes-counter">${comment.likes}</span>
                <button class="${likeButtonClass}" data-id="${comment.id}"></button>
              </div>
            </div>
          </li>
        `;
        
        commentsList.insertAdjacentHTML('beforeend', commentHtml);
      }
      
      attachLikeHandlers();
      attachCommentClickHandlers(); 
    }

   

    function attachLikeHandlers() {
      const likeButtons = document.querySelectorAll('.like-button');
      
      for (let i = 0; i < likeButtons.length; i++) {
        const button = likeButtons[i];
        button.removeEventListener('click', handleLikeClick);
        button.addEventListener('click', handleLikeClick);
      }
    }

    function handleLikeClick(event) {
      event.stopPropagation();
      
      const button = event.currentTarget;
      const commentId = parseInt(button.getAttribute('data-id'));
      
      let comment = null;
      for (let i = 0; i < comments.length; i++) {
        if (comments[i].id === commentId) {
          comment = comments[i];
          break;
        }
      }
      
      if (comment) {
        if (comment.isLiked) {
          comment.isLiked = false;
          comment.likes = comment.likes - 1;
        } else {
          comment.isLiked = true;
          comment.likes = comment.likes + 1;
        }
        
        renderComments();
      }
    }

  function attachCommentClickHandlers() {
      const commentElements = document.querySelectorAll('.comment');
      
      for (let i = 0; i < commentElements.length; i++) {
        const commentElement = commentElements[i];
        commentElement.removeEventListener('click', handleCommentClick);
        commentElement.addEventListener('click', handleCommentClick);
      }
    }

    function handleCommentClick(event) {
      const commentElement = event.currentTarget;
      const commentId = parseInt(commentElement.getAttribute('data-id'));
      let comment = null;
      for (let i = 0; i < comments.length; i++) {
        if (comments[i].id === commentId) {
          comment = comments[i];
          break;
        }
      }
      
      if (comment) {
        const nameInput = document.querySelector('.add-form-name');
        const commentInput = document.querySelector('.add-form-text');
        
        nameInput.value = comment.name;
        commentInput.value = `> ${comment.text}\n\n`;
        commentInput.focus();
      }
    }

   function addNewComment(name, text) {
      const newComment = {
        id: Date.now(),
        name: sanitizeHtml(name), 
        text: sanitizeHtml(text),  
        date: getCurrentDateTime(),
        likes: 0,
        isLiked: false
      };
      
      comments.push(newComment);
      renderComments();
    }

    const nameInput = document.querySelector('.add-form-name');
    const commentInput = document.querySelector('.add-form-text');
    const addButton = document.querySelector('.add-form-button');

    function validateAndAdd() {
      let name = nameInput.value.trim();
      let comment = commentInput.value.trim();
      
      if (name === '') {
        alert('Пожалуйста, введите ваше имя');
        return;
      }
      
      if (comment === '') {
        alert('Пожалуйста, введите текст комментария');
        return;
      }
      
      name = sanitizeHtml(name);
      comment = sanitizeHtml(comment);
      
      addNewComment(name, comment);
      
      nameInput.value = '';
      commentInput.value = '';
    }

    addButton.addEventListener('click', validateAndAdd);
    
    commentInput.addEventListener('keypress', function(event) {
      if (event.key === 'Enter' && !event.shiftKey) {
        event.preventDefault();
        validateAndAdd();
      }
    });
    renderComments();
  </script>
</html>
